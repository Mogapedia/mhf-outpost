<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" fill="#0f1117"/>
  <!-- pennant on top of balloon -->
  <line x1="128" y1="20" x2="128" y2="46" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
  <path d="M 128 22 L 152 28 L 128 34 Z" fill="#c9a84c"/>
  <!-- horizontal cigar balloon -->
  <path d="M 24 110
           C 24 84, 56 64, 96 64
           L 160 64
           C 200 64, 232 84, 232 110
           C 232 136, 200 156, 160 156
           L 96 156
           C 56 156, 24 136, 24 110 Z"
        fill="#c9a84c"/>
  <!-- decorative bands marking balloon panels -->
  <line x1="96"  y1="64" x2="96"  y2="156" stroke="#0f1117" stroke-width="3"/>
  <line x1="160" y1="64" x2="160" y2="156" stroke="#0f1117" stroke-width="3"/>
  <!-- ropes from balloon down to the wooden hull -->
  <line x1="80"  y1="156" x2="84"  y2="184" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
  <line x1="108" y1="156" x2="106" y2="184" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="156" x2="150" y2="184" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
  <line x1="176" y1="156" x2="172" y2="184" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
  <!-- boat-hull gondola -->
  <path d="M 76 184
           L 180 184
           L 174 212
           Q 128 236 82 212 Z"
        fill="#c9a84c"/>
  <!-- single plank line on hull -->
  <line x1="86" y1="200" x2="170" y2="200" stroke="#0f1117" stroke-width="2"/>
</svg>
