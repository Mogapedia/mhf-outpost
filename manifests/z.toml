# Vanilla untranslated Japanese MHF-Z snapshot, captured from Capcom Online
# Games client. Binaries dated 2019-09-09; MHFUP.TMP dated 2019-12-18 (shutdown
# day), so this appears to be a client captured mid-update just before the
# final ZZ patch landed. No `mhf-zz.exe` — main binary is `mhf.exe`.
#
# Extraction: the archive.org item contains one 7z file (MHFO.7z) which expands
# to `MHFO/CAPCOM/Monster Hunter Frontier Online/` and
# `MHFO/CAPCOM TAIWAN/...`. Use the CAPCOM subdirectory for this manifest.
# The CAPCOM TAIWAN subtree is a separate MHF-Z TW variant not covered here.

